services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resume_form
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_form"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  postgres_data:
